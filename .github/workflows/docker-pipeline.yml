name: Docker CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t flervalsfraga:${{ github.sha }} .
          docker tag flervalsfraga:${{ github.sha }} flervalsfraga:latest
