<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz-Class-Prototype</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <div class="app">
        <h1>Quiz: Class and Prototypes in JavaScript</h1>
        <div class="quiz">
            <h2 id="question">Placeholder for questions</h2>
            <pre id="code-snippet" class="code-block"></pre>
            <div id="answer-btn">
                <button class="answer-btn">Answer 1</button>
                <button class="answer-btn">Answer 2</button>
                <button class="answer-btn">Answer 3</button>
                <button class="answer-btn">Answer 4</button>
            </div>

            <!--Next button--->
            <button id="next-btn">Next</button>

            <!--Count the answered questions-->
            <div class="controls">
                <p id="progress">Besvarade: 0 / 0</p>

                <!--Prev button-->
                <button id="prev-btn">Tillbaka</button>

            </div>
        </div>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
